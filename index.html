/* 语商实验室交互网站：默认展开侧边栏 */
:root{--yushang-sidebar-width:236px}
body.has-yushang-sidebar .app-shell{padding-left:var(--yushang-sidebar-width);transition:padding-left .22s ease}
body.has-yushang-sidebar.sidebar-collapsed .app-shell{padding-left:0}
.yushang-sidebar{position:fixed;inset:0 auto 0 0;width:var(--yushang-sidebar-width);z-index:80;padding:22px 16px;background:linear-gradient(180deg,rgba(13,27,61,.98),rgba(13,27,61,.94));color:#fffdf8;box-shadow:18px 0 44px rgba(13,27,61,.18);transform:translateX(0);transition:transform .22s ease;display:flex;flex-direction:column;gap:22px}
body.sidebar-collapsed .yushang-sidebar{transform:translateX(calc(-1 * var(--yushang-sidebar-width)))}
.yushang-sidebar:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 18% 8%,rgba(200,161,90,.22),transparent 28%),linear-gradient(135deg,rgba(255,253,248,.08),transparent 42%);pointer-events:none}
.yushang-sidebar>*{position:relative;z-index:1}
.yushang-sidebar-brand{display:flex;align-items:center;gap:12px;padding-bottom:18px;border-bottom:1px solid rgba(255,253,248,.16)}
.yushang-sidebar-brand img{width:58px;height:auto;border-radius:14px;background:#fffdf8;padding:5px;box-shadow:0 10px 22px rgba(0,0,0,.16)}
.yushang-sidebar-brand strong{display:block;font-size:18px;letter-spacing:.04em;line-height:1.2}
.yushang-sidebar-brand small{display:block;margin-top:4px;color:rgba(255,253,248,.68);font-size:11px;line-height:1.3}
.yushang-sidebar-nav{display:grid;gap:8px}
.yushang-sidebar-nav button{width:100%;border:1px solid rgba(255,253,248,.12);border-radius:16px;padding:12px 13px;background:rgba(255,253,248,.06);color:#fffdf8;text-align:left;font-weight:800;line-height:1.2;transition:background .18s ease,color .18s ease,border-color .18s ease,transform .18s ease}
.yushang-sidebar-nav button:hover{background:rgba(255,253,248,.12);transform:translateX(2px)}
.yushang-sidebar-nav button.active{background:#c8a15a;color:#0d1b3d;border-color:#c8a15a;box-shadow:0 10px 24px rgba(200,161,90,.24)}
.yushang-sidebar-note{margin-top:auto;border-radius:18px;padding:14px;background:rgba(255,253,248,.08);color:rgba(255,253,248,.78);font-size:13px;line-height:1.55}
.yushang-sidebar-switch{position:fixed;left:calc(var(--yushang-sidebar-width) + 14px);top:92px;z-index:90;border:1px solid rgba(200,161,90,.42);border-radius:999px;padding:10px 14px;background:#c8a15a;color:#0d1b3d;font-weight:900;box-shadow:0 12px 28px rgba(13,27,61,.18);transition:left .22s ease,background .18s ease,color .18s ease}
body.sidebar-collapsed .yushang-sidebar-switch{left:14px;background:#0d1b3d;color:#fffdf8;border-color:rgba(255,253,248,.18)}
@media (max-width: 900px){body.has-yushang-sidebar .app-shell{padding-left:0}.yushang-sidebar{width:min(78vw,270px)}body.sidebar-collapsed .yushang-sidebar{transform:translateX(-100%)}.yushang-sidebar-switch{left:min(calc(78vw + 14px),284px);top:86px}body.sidebar-collapsed .yushang-sidebar-switch{left:14px}}

  <body>
    <aside class="yushang-sidebar" aria-label="语商实验室侧边导航">
      <div class="yushang-sidebar-brand">
        <img src="logo-placeholder.svg" alt="语商实验室" />
        <div>
          <strong>语商实验室</strong>
          <small>AI时代语文能力训练</small>
        </div>
      </div>
      <nav class="yushang-sidebar-nav" aria-label="页面导航">
        <button type="button" data-route="#/">首页</button>
        <button type="button" data-route="#/lessons">8节小任务</button>
        <button type="button" data-route="#/science-stories">科学故事</button>
        <button type="button" data-route="#/student-works">孩子作品</button>
        <button type="button" data-route="#/parent-learning">家长共学</button>
        <button type="button" data-route="#/about">关于语商</button>
      </nav>
      <div class="yushang-sidebar-note">侧边栏默认展开，便于网课/录播浏览时快速切换模块。</div>
    </aside>
    <button class="yushang-sidebar-switch" type="button" aria-label="收起侧边栏" aria-expanded="true">收起侧栏</button>
    <script>
      (function(){
        document.body.classList.add('has-yushang-sidebar');
        var toggle = document.querySelector('.yushang-sidebar-switch');
        var buttons = Array.prototype.slice.call(document.querySelectorAll('.yushang-sidebar-nav [data-route]'));
        function currentHash(){ return window.location.hash || '#/'; }
        function isActive(route, hash){
          if(route === '#/') return hash === '#/' || hash === '' || hash === '#';
          if(route === '#/lessons') return hash === '#/lessons' || hash.indexOf('#/lessons/') === 0;
          return hash === route;
        }
        function syncActive(){
          var hash = currentHash();
          buttons.forEach(function(btn){ btn.classList.toggle('active', isActive(btn.getAttribute('data-route'), hash)); });
          var collapsed = document.body.classList.contains('sidebar-collapsed');
          if(toggle){
            toggle.textContent = collapsed ? '打开侧栏' : '收起侧栏';
            toggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
            toggle.setAttribute('aria-label', collapsed ? '打开侧边栏' : '收起侧边栏');
          }
        }
        buttons.forEach(function(btn){
          btn.addEventListener('click', function(){
            window.location.hash = btn.getAttribute('data-route');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            syncActive();
          });
        });
        if(toggle){
          toggle.addEventListener('click', function(){
            document.body.classList.toggle('sidebar-collapsed');
            syncActive();
          });
        }
        window.addEventListener('hashchange', syncActive);
        syncActive();
      })();
    </script>
